name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-linux
            name: linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-linux
            name: linux-arm64
          - os: macos-14
            target: aarch64-macos
            name: macos-arm64
          - os: windows-latest
            target: x86_64-windows
            name: windows-x64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dstrip=true

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKGNAME="wabt-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$PKGNAME/bin"
          cp zig-out/bin/* "$PKGNAME/bin/"
          cp LICENSE README.md "$PKGNAME/"
          tar czf "$PKGNAME.tar.gz" "$PKGNAME"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
          else
            shasum -a 256 "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"
          fi

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PKGNAME="wabt-${{ steps.version.outputs.version }}-${{ matrix.name }}"
          mkdir -p "$PKGNAME/bin"
          cp zig-out/bin/*.exe "$PKGNAME/bin/"
          cp LICENSE README.md "$PKGNAME/"
          tar czf "$PKGNAME.tar.gz" "$PKGNAME"
          sha256sum "$PKGNAME.tar.gz" > "$PKGNAME.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.name }}
          path: |
            wabt-*.tar.gz
            wabt-*.sha256

  source:
    name: Source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package source
        run: |
          PKGNAME="wabt-${{ steps.version.outputs.version }}"
          git archive --format=tar --prefix="$PKGNAME/" HEAD | xz > "$PKGNAME.tar.xz"
          sha256sum "$PKGNAME.tar.xz" > "$PKGNAME.tar.xz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source
          path: |
            wabt-*.tar.xz
            wabt-*.sha256

  release:
    name: Create Release
    needs: [build, source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            wabt-*.tar.gz
            wabt-*.tar.xz

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: wabt ${{ steps.version.outputs.version }}
          body: |
            ## wabt ${{ steps.version.outputs.version }} — Zig rewrite

            Experimental fork of [WebAssembly/wabt](https://github.com/WebAssembly/wabt) rewritten from C++ to Zig.

            **Highlights:**
            - 100% WebAssembly 3.0 spec conformance (65011/65011 assertions)
            - Build system: `build.zig` with cross-compilation
            - Zig 0.15.2 (no C/C++ dependencies)
            - Built with `ReleaseSafe` (runtime bounds/overflow checks enabled)

            **Tools included:** wat2wasm, wasm2wat, wast2json, wasm-validate, wasm-objdump, wasm2c, wasm-interp, wasm-decompile, wasm-strip, wasm-stats, wat-desugar, spectest-interp, wasm2wat-fuzz
          files: |
            wabt-*.tar.gz
            wabt-*.tar.xz
            wabt-*.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'dev') }}
