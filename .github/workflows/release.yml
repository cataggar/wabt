name: Release hello

# Publishes a release for the example/hello branch when a `hello-*` tag is
# pushed (e.g. hello-2.0.0). This is a secondary release for the repo, so it is always
# marked as a pre-release.

on:
  push:
    tags:
      - 'hello-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing hello-* tag to release (e.g. hello-2.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish hello.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#hello-}" >> "$GITHUB_OUTPUT"

      - name: Install zig and wabt
        uses: cataggar/ghr/actions/install@v0.6.0
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U
            cataggar/wabt@v3.0.0-dev.19 RWSBnHWjwk/kkqdYc74cGupHMNVobpmF3lPc7b8RIllYMmYBr5G2EyF0

      - name: Build release component
        run: zig build

      - name: Stage release assets
        run: |
          set -euo pipefail
          cp zig-out/hello.wasm hello.wasm
          # Launcher manifest consumed by `ghr`: how to run hello.wasm.
          cat > hello.wasm.ghr <<'EOF'
          .{
              .version = 1,
              .runtime = "wasmtime",
              .runtimeArgs = .{
                  "run",
                  "-W", "component-model-async",
                  "-W", "component-model-async-stackful",
                  "-W", "component-model-more-async-builtins",
                  "-W", "component-model-error-context",
                  "-S", "cli-exit-with-code",
              },
          }
          EOF
          cat hello.wasm.ghr

      - name: Sign hello.wasm with minisign (.minisig sidecar)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD:   ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          # `ghr minisign sign` signs without an external minisign binary,
          # key file, or expect script: the key/password come from the env.
          # Encode self-identifying metadata in the signed trusted comment.
          comment="timestamp:$(date +%s) file:hello.wasm commit:${GITHUB_SHA} tag:${{ steps.meta.outputs.tag }}"
          echo "signing hello.wasm (trusted comment: ${comment})"
          ghr minisign sign hello.wasm -t "$comment"
          ls -la hello.wasm.minisig

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: hello ${{ steps.meta.outputs.version }}
          body: |
            A `wasi:cli` command example, installable with [ghr](https://github.com/cataggar/ghr):**

            ```
            ghr install cataggar/wabt@${{ steps.meta.outputs.tag }}
            ```
          files: |
            hello.wasm
            hello.wasm.ghr
            hello.wasm.minisig
          draft: false
          prerelease: true
