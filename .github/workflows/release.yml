name: Release hello

# Publishes a release for the example/hello branch when a `hello-*` tag is
# pushed (e.g. hello-2.0.0). This is a secondary release for the repo, so it is always
# marked as a pre-release.

on:
  push:
    tags:
      - 'hello-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing hello-* tag to release (e.g. hello-2.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish hello.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#hello-}" >> "$GITHUB_OUTPUT"

      - name: Install zig, wabt, and minisign
        uses: cataggar/ghr/actions/install@v0.5.2
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U
            cataggar/wabt@v3.0.0-dev.19 RWSBnHWjwk/kkqdYc74cGupHMNVobpmF3lPc7b8RIllYMmYBr5G2EyF0
            jedisct1/minisign@0.12 RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3

      - name: Build release component
        run: zig build

      - name: Stage release assets
        run: |
          set -euo pipefail
          cp zig-out/hello.wasm hello.wasm
          # Launcher manifest consumed by `ghr`: how to run hello.wasm.
          cat > hello.wasm.ghr <<'EOF'
          .{
              .version = 1,
              .runtime = "wasmtime",
              .runtimeArgs = .{
                  "run",
                  "-W", "component-model-async",
                  "-W", "component-model-async-stackful",
                  "-W", "component-model-more-async-builtins",
                  "-W", "component-model-error-context",
                  "-S", "cli-exit-with-code",
              },
          }
          EOF
          cat hello.wasm.ghr

      - name: Sign hello.wasm with minisign (.minisig sidecar)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD:   ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -qq -y expect
          # Write the secret key to a 0600 file; the runner workspace is
          # ephemeral and the trap removes it before the step exits.
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          trap 'rm -f minisign.key' EXIT
          # The trusted comment is printed by `ghr install` on successful
          # verification, so encode self-identifying metadata in it.
          comment="timestamp:$(date +%s) file:hello.wasm commit:${GITHUB_SHA} tag:${{ steps.meta.outputs.tag }}"
          echo "signing hello.wasm (trusted comment: ${comment})"
          expect scripts/sign-asset.exp hello.wasm "$comment"
          ls -la hello.wasm.minisig

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: hello ${{ steps.meta.outputs.version }}
          body: |
            A `wasi:cli` command example, installable with [ghr](https://github.com/cataggar/ghr):**

            ```
            ghr install cataggar/wabt@${{ steps.meta.outputs.tag }}
            ```
          files: |
            hello.wasm
            hello.wasm.ghr
            hello.wasm.minisig
          draft: false
          prerelease: true
